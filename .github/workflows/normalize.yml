name: Normalize Tokens

on:
  push:
    paths:
      - 'tokens/Color.json'

jobs:
  normalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Color.json → color.dtcg.tokens.json 변환
        run: node scripts/convert.mjs

      - name: color.dtcg.tokens.json → color.normalized.tokens.json 변환
        run: node scripts/normalize.mjs

      - name: 결과물 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/color.dtcg.tokens.json tokens/color.normalized.tokens.json
          git diff --staged --quiet || git commit -m "chore: 토큰 자동 변환 (color.dtcg, color.normalized)"
          git push
