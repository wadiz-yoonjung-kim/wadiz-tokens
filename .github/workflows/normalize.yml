name: Normalize Tokens

on:
  push:
    paths:
      - 'tokens/*.json'
    branches:
      - main

jobs:
  normalize:
    runs-on: ubuntu-latest
    # 봇 커밋으로 인한 무한 루프 방지
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Figma JSON → DTCG 변환
        run: node scripts/convert.mjs

      - name: DTCG → normalized 변환 및 manifest 생성
        run: node scripts/normalize.mjs

      - name: 결과물 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/*.dtcg.tokens.json tokens/*.normalized.tokens.json tokens/manifest.json
          git diff --staged --quiet || git commit -m "chore: 토큰 자동 변환"
          git push
